
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voces y Cuerdas - Control Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --policia-blue: #003366;
            --policia-gold: #c5a059;
        }
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .header-gradient {
            background: linear-gradient(135deg, var(--policia-blue) 0%, #001f40 100%);
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="header-gradient text-white p-6 rounded-b-3xl shadow-lg mb-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-white">Voces y Cuerdas</h1>
                <p class="text-blue-200 text-sm italic">Banda de Música - Policía Nacional</p>
            </div>
            <div class="bg-white/10 p-2 rounded-full shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            </div>
        </div>
    </header>

    <main class="px-4 max-w-lg mx-auto">
        <!-- Search -->
        <div class="mb-6">
            <input type="text" id="searchInput" placeholder="Buscar unidad o posición..." 
                class="w-full p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                onkeyup="filterList()">
        </div>

        <!-- Global Stats -->
        <div class="grid grid-cols-2 gap-4 mb-6 text-center">
            <div class="bg-white p-4 rounded-2xl card-shadow">
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Total Unidades</p>
                <p class="text-2xl font-black text-blue-900">19</p>
            </div>
            <div class="bg-white p-4 rounded-2xl card-shadow">
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Saldo Global</p>
                <p id="totalGlobalDays" class="text-2xl font-black text-amber-600">0</p>
            </div>
        </div>

        <!-- Member List -->
        <div id="memberList" class="space-y-4">
            <!-- Items injected by JS -->
        </div>
    </main>

    <!-- Modal for Events/History -->
    <div id="eventModal" class="fixed inset-0 bg-black/60 hidden flex-col justify-end sm:justify-center p-0 sm:p-4 z-50">
        <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 id="modalTitle" class="text-xl font-bold text-gray-800 tracking-tight">Nombre de la Unidad</h2>
                    <p id="modalSub" class="text-sm text-gray-500 font-medium"></p>
                </div>
                <button onclick="closeModal()" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- Enhanced Automated New Event Form -->
            <div id="formSection" class="bg-blue-50 p-4 rounded-2xl mb-6 border border-blue-100">
                <h3 id="formActionTitle" class="text-xs font-black text-blue-800 mb-4 uppercase tracking-widest">Registrar Movimiento</h3>
                <div class="space-y-4">
                    <div id="typeSelectorCont">
                        <label class="text-[10px] uppercase font-black text-gray-400 px-1">Acción</label>
                        <select id="eventType" class="w-full p-3 mt-1 rounded-xl border-none outline-none bg-white font-bold text-gray-700 shadow-sm" onchange="toggleInputs()">
                            <option value="sumar">Día Trabajado (+1)</option>
                            <option value="restar">Día Libre Tomado (-1)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <div>
                            <label class="text-[10px] uppercase font-black text-gray-400 px-1">Fecha</label>
                            <input type="date" id="eventDate" class="w-full p-3 mt-1 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                        </div>
                        
                        <!-- These fields will toggle visibility based on action -->
                        <div id="extraFields" class="space-y-3">
                            <div id="descContainer">
                                <label class="text-[10px] uppercase font-black text-gray-400 px-1">Nombre del Evento / Detalle</label>
                                <input type="text" id="eventDesc" placeholder="Ej: Gala de Aniversario" class="w-full p-3 mt-1 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                            </div>

                            <div id="groupContainer">
                                <label class="text-[10px] uppercase font-black text-gray-400 px-1">Agrupación Musical</label>
                                <input type="text" id="eventGroup" placeholder="Ej: Orquesta, Murga, etc." class="w-full p-3 mt-1 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                            </div>

                            <div id="placeContainer">
                                <label class="text-[10px] uppercase font-black text-gray-400 px-1">Lugar del Evento</label>
                                <input type="text" id="eventPlace" placeholder="Ej: Teatro Nacional" class="w-full p-3 mt-1 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button id="cancelEditBtn" onclick="resetForm()" class="hidden flex-1 py-4 bg-gray-200 text-gray-600 rounded-xl font-black uppercase text-xs tracking-widest">Cancelar</button>
                        <button id="submitBtn" onclick="addOrUpdateEvent()" class="flex-[2] py-4 bg-blue-900 text-white rounded-xl font-black uppercase text-xs tracking-widest shadow-lg hover:bg-blue-800 active:scale-95 transition-all">
                            Guardar Registro
                        </button>
                    </div>
                </div>
            </div>

            <!-- History List -->
            <div>
                <h3 class="text-xs font-black text-gray-400 mb-3 uppercase tracking-widest">Historial Detallado</h3>
                <div id="historyList" class="space-y-3">
                    <!-- Events here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data State with Persistence Logic
        const defaultMembers = [
            { id: 1, pos: 1, rango: "Subteniente", nombre: "Arnides Ceballos", tipo: "U", eventos: [] },
            { id: 2, pos: 2, rango: "Subteniente", nombre: "Fernando Brewster", tipo: "U", eventos: [] },
            { id: 3, pos: 3, rango: "Subteniente", nombre: "Brenda Tamayo", tipo: "U", eventos: [] },
            { id: 4, pos: 4, rango: "Sargento 1ro.", nombre: "Adrián Julio", tipo: "U", eventos: [] },
            { id: 5, pos: 5, rango: "Agente", nombre: "Ariadna Díaz", tipo: "U", eventos: [] },
            { id: 6, pos: 6, rango: "M.N.J.", nombre: "Moisés Capuro", tipo: "C", eventos: [] },
            { id: 7, pos: 7, rango: "M.N.J.", nombre: "Edwin Rosedo", tipo: "C", eventos: [] },
            { id: 8, pos: 8, rango: "M.N.J.", nombre: "Antonio Jamerson", tipo: "C", eventos: [] },
            { id: 9, pos: 9, rango: "M.N.J.", nombre: "Rogelio Palmer", tipo: "C", eventos: [] },
            { id: 10, pos: 10, rango: "M.N.J.", nombre: "Bolívar Román", tipo: "C", eventos: [] },
            { id: 11, pos: 11, rango: "M.N.J.", nombre: "Alberto Henríquez", tipo: "C", eventos: [] },
            { id: 12, pos: 12, rango: "M.N.J.", nombre: "Cesar Hand", tipo: "C", eventos: [] },
            { id: 13, pos: 13, rango: "M.N.J.", nombre: "Estela Guillén", tipo: "C", eventos: [] },
            { id: 14, pos: 14, rango: "M.N.J.", nombre: "Giovanni Mendoza", tipo: "C", eventos: [] },
            { id: 15, pos: 15, rango: "M.N.J.", nombre: "Alfredo Pineda", tipo: "C", eventos: [] },
            { id: 16, pos: 16, rango: "M.N.J.", nombre: "Carlos Ramos", tipo: "C", eventos: [] },
            { id: 17, pos: 17, rango: "M.N.J.", nombre: "Carlos Berna", tipo: "C", eventos: [] },
            { id: 18, pos: 18, rango: "M.N.J.", nombre: "Felipe Pineda", tipo: "C", eventos: [] },
            { id: 19, pos: 19, rango: "M.N.J.", nombre: "Jonathan Martinez", tipo: "C", eventos: [] },
        ];

        let members = JSON.parse(localStorage.getItem('vocesCuerdasData')) || defaultMembers;
        let currentMemberId = null;
        let currentEditingEventId = null;

        function saveData() {
            localStorage.setItem('vocesCuerdasData', JSON.stringify(members));
        }

        function getBalance(member) {
            return member.eventos.reduce((acc, ev) => (ev.type === 'sumar' ? acc + 1 : acc - 1), 0);
        }

        function renderMembers() {
            const list = document.getElementById('memberList');
            list.innerHTML = '';
            let totalGlobal = 0;

            members.forEach(m => {
                const balance = getBalance(m);
                totalGlobal += balance;

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl card-shadow flex items-center gap-4 animate-fade-in border border-transparent active:border-blue-200 transition-all";
                card.innerHTML = `
                    <div class="flex-shrink-0 w-12 h-12 ${m.tipo === 'U' ? 'bg-blue-900 text-white' : 'bg-amber-500 text-white'} rounded-full flex items-center justify-center font-black shadow-md">
                        ${m.pos}
                    </div>
                    <div class="flex-grow" onclick="openDetails(${m.id})">
                        <p class="text-[9px] text-gray-400 font-black uppercase tracking-widest mb-0.5">${m.rango}</p>
                        <p class="text-gray-800 font-bold leading-none mb-1 text-sm sm:text-base">${m.nombre}</p>
                        <p class="text-[10px] ${balance >= 0 ? 'text-blue-600' : 'text-red-600'} font-black uppercase">Saldo: ${balance} Días</p>
                    </div>
                    <button onclick="speak('${m.rango} ${m.nombre}', ${balance})" class="p-3 bg-gray-50 rounded-xl text-gray-300 hover:text-blue-600 active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    </button>
                `;
                list.appendChild(card);
            });
            document.getElementById('totalGlobalDays').innerText = totalGlobal;
        }

        function toggleInputs() {
            const type = document.getElementById('eventType').value;
            const extraFields = document.getElementById('extraFields');
            
            if (type === 'sumar') {
                extraFields.classList.remove('hidden');
            } else {
                extraFields.classList.add('hidden');
            }
        }

        function openDetails(id) {
            currentMemberId = id;
            resetForm();
            const m = members.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = m.nombre;
            document.getElementById('modalSub').innerText = `${m.rango} - Posición ${m.pos}`;
            renderHistory();
            document.getElementById('eventModal').classList.remove('hidden');
            document.getElementById('eventModal').classList.add('flex');
        }

        function renderHistory() {
            const m = members.find(x => x.id === currentMemberId);
            const container = document.getElementById('historyList');
            container.innerHTML = '';

            if (m.eventos.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-300 py-10 text-xs italic font-medium uppercase tracking-widest">Sin movimientos registrados</p>';
                return;
            }

            [...m.eventos].reverse().forEach(ev => {
                const item = document.createElement('div');
                item.className = "p-4 bg-gray-50 rounded-2xl border border-gray-100 flex items-start gap-3 relative overflow-hidden";
                
                const valColor = ev.type === 'sumar' ? 'text-red-600' : 'text-green-600';
                const valSign = ev.type === 'sumar' ? '+1' : '-1';
                const borderSide = ev.type === 'sumar' ? 'border-l-4 border-red-500' : 'border-l-4 border-green-500';
                item.className += " " + borderSide;

                let fullInfo = "";
                if (ev.type === 'sumar') {
                    fullInfo = ev.desc;
                    if (ev.group) fullInfo += ` | ${ev.group}`;
                    if (ev.place) fullInfo += ` | ${ev.place}`;
                } else {
                    fullInfo = "Día Libre Tomado";
                }

                item.innerHTML = `
                    <div class="flex-grow space-y-1">
                        <div class="flex justify-between items-start">
                            <p class="text-[10px] text-gray-400 font-black uppercase tracking-tighter">${ev.displayDate}</p>
                            <div class="font-black text-base ${valColor}">${valSign}</div>
                        </div>
                        <p class="text-sm font-bold text-gray-800 leading-tight">
                            ${fullInfo}
                        </p>
                    </div>
                    <button onclick="startEditEvent('${ev.id}')" class="p-2 text-gray-300 hover:text-blue-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                `;
                container.appendChild(item);
            });
        }

        function addOrUpdateEvent() {
            const type = document.getElementById('eventType').value;
            const rawDateVal = document.getElementById('eventDate').value;

            if (!rawDateVal) {
                alert("Por favor selecciona una fecha");
                return;
            }

            const desc = type === 'sumar' ? (document.getElementById('eventDesc').value || "Día Trabajado") : "Día Libre Tomado";
            const group = type === 'sumar' ? document.getElementById('eventGroup').value : "";
            const place = type === 'sumar' ? document.getElementById('eventPlace').value : "";
            
            const displayDate = rawDateVal.split('-').reverse().join('/');
            const m = members.find(x => x.id === currentMemberId);

            if (currentEditingEventId) {
                const evIndex = m.eventos.findIndex(e => e.id === currentEditingEventId);
                m.eventos[evIndex].desc = desc;
                m.eventos[evIndex].group = group;
                m.eventos[evIndex].place = place;
                m.eventos[evIndex].displayDate = displayDate;
                m.eventos[evIndex].rawDate = rawDateVal;
                // Preserve original type on edit unless we add logic to change it
            } else {
                m.eventos.push({
                    id: Date.now().toString(),
                    desc,
                    group,
                    place,
                    type,
                    displayDate,
                    rawDate: rawDateVal
                });
            }

            saveData();
            resetForm();
            renderHistory();
            renderMembers();
        }

        function startEditEvent(eventId) {
            const m = members.find(x => x.id === currentMemberId);
            const ev = m.eventos.find(e => e.id === eventId);
            
            currentEditingEventId = eventId;
            document.getElementById('formActionTitle').innerText = "Editando Registro";
            document.getElementById('typeSelectorCont').classList.add('hidden');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            document.getElementById('eventType').value = ev.type;
            document.getElementById('eventDesc').value = ev.desc || "";
            document.getElementById('eventGroup').value = ev.group || "";
            document.getElementById('eventPlace').value = ev.place || "";
            document.getElementById('eventDate').value = ev.rawDate || "";
            
            toggleInputs();
            document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            currentEditingEventId = null;
            document.getElementById('formActionTitle').innerText = "Registrar Movimiento";
            document.getElementById('typeSelectorCont').classList.remove('hidden');
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('eventDesc').value = '';
            document.getElementById('eventGroup').value = '';
            document.getElementById('eventPlace').value = '';
            document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
            toggleInputs();
        }

        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
            document.getElementById('eventModal').classList.remove('flex');
        }

        function speak(name, balance) {
            const msg = new SpeechSynthesisUtterance(`${name} tiene un saldo de ${balance} días.`);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function filterList() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementById('memberList').children;
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(search) ? "flex" : "none";
            }
        }

        window.onload = renderMembers;
    </script>
</body>
</html>
